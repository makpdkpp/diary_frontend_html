<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Diary - Diary App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow p-4 flex justify-between">
        <h1 class="text-xl font-bold">My Diary</h1>
        <button id="logout-btn" class="bg-red-500 text-white py-1 px-3 rounded">Logout</button>
    </nav>
    <div class="container mx-auto p-4">
        <h2 class="text-lg font-semibold mb-4">Create New Entry</h2>
        <form id="entry-form" class="bg-white p-4 rounded-lg shadow mb-8 space-y-4" enctype="multipart/form-data">
            <div>
                <label class="block text-gray-700">Title</label>
                <input type="text" id="title" class="w-full border-gray-300 rounded mt-1" required />
            </div>
            <div>
                <label class="block text-gray-700">Content</label>
                <textarea id="content" rows="4" class="w-full border-gray-300 rounded mt-1" required></textarea>
            </div>
            <div>
                <label class="block text-gray-700">Image (optional)</label>
                <input type="file" id="image" accept="image/*" class="mt-1" />
            </div>
            <button type="submit" class="bg-blue-500 text-white py-2 px-4 rounded">Save Entry</button>
        </form>

        <h2 class="text-lg font-semibold mb-4">My Entries</h2>
        <div id="entries-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>
    <script src="diary.js"></script>
</body>
</html>
