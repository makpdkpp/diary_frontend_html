<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - Diary App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-xl font-bold mb-4">Register</h2>
        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-gray-700">Username</label>
                <input type="text" id="username" class="w-full border-gray-300 rounded mt-1" required />
            </div>
            <div>
                <label class="block text-gray-700">Password</label>
                <input type="password" id="password" class="w-full border-gray-300 rounded mt-1" required />
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded">Register</button>
        </form>
        <p class="mt-4 text-sm">Already have an account? <a href="login.html" class="text-blue-500">Login</a></p>
    </div>
    <script src="register.js"></script>
</body>
</html>
